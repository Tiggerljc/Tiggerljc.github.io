<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{title}} – Tigger.dev</title>

  <link rel="icon" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Metadata block -->
  <script id="moc-meta" type="application/json">
  {
    "title": "MOC-17",
    "image": "/static/img/favicon.svg",
    "description": "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
    "slug": "moc-17"
  }
  </script>
</head>

<body>
  <!-- Header + Sidebar loaders -->
  <div id="site-header"></div>
  <script src="/static/js/LoadHeader.js" defer></script>

  <div id="app" class="layout">
    <div id="site-sidebar"></div>
    <script src="/static/js/LoadSidebar.js" defer></script>

    <main class="main">
      <section class="moc-page">
        <h1>{{title}}</h1>
        <div class="filler-img"></div>
        <p>{{description}}</p>

        <!-- You can add build notes, parts list, gallery, etc. -->
      </section>
    </main>
  </div>
</body>
</html>
