<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tigger.dev</title>
  <link rel="icon" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/router.js" defer></script>
  <script src="/static/img/filler-img.js" defer></script>
  <script src="/static/js/themes.js" defer></script>
  <script src="/static/js/main.js" defer></script>
</head>
<body class="fx-grid">
  
  <div class="page">
    
    <!-- Header Loader -->
    <div id="site-header"></div>
    <script src="/static/js/LoadHeader.js" defer></script>

    <!-- Main layout -->
    <div id="app" class="layout">

      <!-- Sidebar Loader -->
      <div id="site-sidebar" class="sidebar"></div>
      <script src="/static/js/LoadSidebar.js" defer></script>

      <main class="main fx-hex" role="main">

        <!-- Titlebar Loader -->
        <div id="site-titlebar"></div>
        <script src="/static/js/LoadTitlebar.js" defer></script>

        <!-- Dynamic content slot -->
        <div id="content"></div>

        <!-- Footer Loader -->
        <div id="site-footer" class="footer"></div>
        <script src="/static/js/LoadFooter.js" defer></script>

      </main>

    </div>

  </div>

</body>
</html>
