<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <defs>
    <filter id="liquid-glass">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blurred" />
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
      <feDisplacementMap in="blurred" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feColorMatrix in="displaced" type="saturate" values="1.3" result="saturated" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="rim" />
      <feBlend in="saturated" in2="rim" mode="lighten" />
    </filter>
    
    <filter id="liquid-glass-theme">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blurred" />
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
      <feDisplacementMap in="blurred" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feColorMatrix in="displaced" type="saturate" values="1.5" result="saturated" />
      <feColorMatrix in="saturated" type="matrix" values="1.1 0 0.2 0 0, 0.8 1 0 0 0, 0.6 0 1 0 0, 0 0 0 1 0" result="tinted" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="rim" />
      <feBlend in="tinted" in2="rim" mode="lighten" />
    </filter>
  </defs>
</svg>
