<svg width="200" height="200" viewBox="0 0 200 200"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Thin stroke using your theme accent, but very faint -->
    <style>
      .hex {
        fill: none;
        stroke: white;
        stroke-width: 0.8;
      }
      .line {
        fill: none;
        stroke: white;
        stroke-width: 0.6;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <!-- Cluster 1 -->
  <polygon class="hex"
           points="40,20 60,20 70,37 60,54 40,54 30,37" />
  <polygon class="hex"
           points="70,37 90,37 100,54 90,71 70,71 60,54" />
  <line class="line" x1="70" y1="71" x2="90" y2="95" />

  <!-- Cluster 2 (partial / broken) -->
  <polygon class="hex"
           points="140,40 160,40 170,57 160,74 140,74 130,57" />
  <line class="line" x1="130" y1="57" x2="115" y2="45" />
  <line class="line" x1="170" y1="57" x2="185" y2="50" />

  <!-- Cluster 3 (smaller, partial) -->
  <polygon class="hex"
           points="50,130 62,130 68,141 62,152 50,152 44,141" />
  <line class="line" x1="62" y1="152" x2="72" y2="168" />

  <!-- A few stray lines -->
  <line class="line" x1="150" y1="140" x2="170" y2="160" />
  <line class="line" x1="120" y1="110" x2="135" y2="125" />
</svg>
