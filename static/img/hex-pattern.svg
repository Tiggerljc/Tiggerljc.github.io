<svg width="1024" height="1024" viewBox="0 0 2048 2048"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hex { fill:none; stroke:white; stroke-width:2.2; }
      .line { fill:none; stroke:white; stroke-width:2.2; stroke-linecap:round; }
    </style>
  </defs>

<!-- Flat top hex formula
( -s/2, -h/2 )
(  s/2, -h/2 )
(   s,    0  )
(  s/2,  h/2 )
( -s/2,  h/2 )
(  -s,    0  )

s = side length
h = height = s * sqrt(3)
w = width = 2s
r = vertical distance between rows = 0.5h

If s = 20, then h = 20 * sqrt(3) ≈ 34.64, and the points are:
( -10, -17.32 )
(  10, -17.32 )
(  20,   0    )
(  10,  17.32 )
( -10,  17.32 )
( -20,   0    )

In order to connect hexes edge-to-edge, we must use
staggered rows. The formula is:
top: (0, -h)
bottom: (0, h)
top-right: (1.5s, -h/2)
bottom-right: (1.5s, h/2)
bottom-left: (-1.5s, h/2)
top-left: (-1.5s, -h/2)

Therefore, for s = 20, we have:
top: (0, -34.64)
bottom: (0, -34.64)
top-right: (30, -17.32)
bottom-right: (30, 17.32)
bottom-left: (-30, 17.32)
top-left: (-30, -17.32)

However, in order to simplify the translations, we can set a grid value using x and y coords of the hex centers,
at increments of 1. This means that if we want a hex above the center hex, we can just translate(0, -1) steps,
and the formula will take care of the actual pixel values. This also allows us to easily form hex clusters without
calucating the pixel values for each hex. The formula then becomes (n(x), n(y)) where n is the number of steps from the center hex,
and x and y are the values from the staggered row formula. 
For example, if we want a hex that is toward the bottom-right of the center hex, we can input the values of (1, 1) steps,
and the formula will calculate the pixel values as (1(1.5s), 0(h/2)). If we want a hex that is toward the bottom-left
of that hex, we can input the values (2, 2) and calculate (2(1.5s), 0(h/2)).
The axial coords for incremental steps are as follows:
top:          ( 0, -1)
bottom:       ( 0, +1)
top-right:    (+1, -1)
bottom-right: (+1,  0)
bottom-left:  (-1, +1)
top-left:     (-1,  0)

The conversion formula between the pixel-coordinates and the grid system can be written as:
x = s * 3/2 * q
y = h * (r + q/2)
using the pre-determined values of s, h, and r above.

Clusters of hexes are built using the above formulas, centered around (0,0) for easy rotation and translation.
Each cluster is then rotated and translated collectively using <g transform=""></g> to create a more dynamic pattern.
-->

  <!-- ========================= -->
  <!-- Cluster 1 (upper-left)    -->
  <!-- ========================= -->
  <g transform="translate(100,200)">
    <polygon class="hex" points="-10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <polygon class="hex" points="-10,-51.96 10,-51.96 20,-34.64 10,-17.32 -10,-17.32 -20,-34.64" />
    <polygon class="hex" points="-10,17.32 10,17.32 20,34.64 10,51.96 -10,51.96 -20,34.64" />
    <polygon class="hex" points="20,-34.64 40,-34.64 50,-17.32 40,0 20,0 10,-17.32" />
    <polygon class="hex" points="20,0 40,0 50,17.32 40,34.64 20,34.64 10,17.32" />
    <polygon class="hex" points="-40,0 -20,0 -10,17.32 -20,34.64 -40,34.64 -50,17.32" />
    <polygon class="hex" points="-40,-34.64 -20,-34.64 -10,-17.32 -20,0 -40,0 -50,-17.32" />
  </g>

  <!-- ========================= -->
  <!-- Cluster 2 (upper-right)   -->
  <!-- ========================= -->
  <g transform="translate(1500,300) rotate(2)">
    <polygon class="hex" points="0,0 32,0 48,28 32,56 0,56 -16,28" />
    <polygon class="hex" points="32,56 64,56 80,84 64,112 32,112 16,84" />
    <line class="line" x1="48" y1="28" x2="78" y2="10" />
    <line class="line" x1="0" y1="56" x2="-26" y2="80" />
    <line class="line" x1="16" y1="84" x2="0" y2="110" />
  </g>

  <!-- ========================= -->
  <!-- Cluster 3 (center-left)   -->
  <!-- ========================= -->
  <g transform="translate(420,1020) rotate(1)">
    <polygon class="hex" points="0,0 32,0 48,28 32,56 0,56 -16,28" />
    <polygon class="hex" points="32,56 64,56 80,84 64,112 32,112 16,84" />
    <polygon class="hex" points="64,112 96,112 112,140 96,168 64,168 48,140" />
    <line class="line" x1="0" y1="56" x2="-20" y2="90" />
    <line class="line" x1="80" y1="84" x2="110" y2="70" />
    <line class="line" x1="48" y1="140" x2="30" y2="170" />
  </g>

  <!-- ========================= -->
  <!-- Cluster 4 (center-right)  -->
  <!-- ========================= -->
  <g transform="translate(1380,1080) rotate(-4)">
    <polygon class="hex" points="0,0 32,0 48,28 32,56 0,56 -16,28" />
    <polygon class="hex" points="32,56 64,56 80,84 64,112 32,112 16,84" />
    <line class="line" x1="48" y1="28" x2="70" y2="0" />
    <line class="line" x1="32" y1="112" x2="48" y2="144" />
    <line class="line" x1="-16" y1="28" x2="-40" y2="10" />
  </g>

  <!-- ========================= -->
  <!-- Cluster 5 (lower-left)    -->
  <!-- ========================= -->
  <g transform="translate(300,1700) rotate(3)">
    <polygon class="hex" points="0,0 28,0 42,24 28,48 0,48 -14,24" />
    <polygon class="hex" points="28,48 56,48 70,72 56,96 28,96 14,72" />
    <line class="line" x1="0" y1="48" x2="-20" y2="70" />
    <line class="line" x1="56" y1="96" x2="70" y2="120" />
  </g>

  <!-- ========================= -->
  <!-- Cluster 6 (lower-right)   -->
  <!-- ========================= -->
  <g transform="translate(1600,1760) rotate(-2)">
    <polygon class="hex" points="0,0 28,0 42,24 28,48 0,48 -14,24" />
    <polygon class="hex" points="28,48 56,48 70,72 56,96 28,96 14,72" />
    <polygon class="hex" points="56,96 84,96 98,120 84,144 56,144 42,120" />
    <line class="line" x1="42" y1="120" x2="20" y2="150" />
    <line class="line" x1="-14" y1="24" x2="-30" y2="10" />
  </g>

  <!-- ========================= -->
  <!-- Cluster 7 (center-mid)    -->
  <!-- ========================= -->
  <g transform="translate(1020,760) rotate(1)">
    <polygon class="hex" points="0,0 32,0 48,28 32,56 0,56 -16,28" />
    <polygon class="hex" points="32,56 64,56 80,84 64,112 32,112 16,84" />
    <line class="line" x1="48" y1="28" x2="70" y2="10" />
    <line class="line" x1="0" y1="56" x2="-20" y2="80" />
  </g>

  <!-- ========================= -->
  <!-- Stray tech lines          -->
  <!-- ========================= -->
  <line class="line" x1="900" y1="400" x2="960" y2="460" />
  <line class="line" x1="1100" y1="1400" x2="1180" y2="1480" />
  <line class="line" x1="600" y1="800" x2="660" y2="860" />
</svg>