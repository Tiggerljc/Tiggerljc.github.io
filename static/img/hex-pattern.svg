<svg width="2048" height="2048" viewBox="0 0 2048 2048"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hex { fill:none; stroke:white; stroke-width:2.2; stroke-opacity:0.26; }
      .hex-faint { fill:none; stroke:white; stroke-width:2.2; stroke-opacity:0.2; }
      .line { fill:none; stroke:white; stroke-width:2.2; stroke-linecap:round; }
    </style>
    <polyline id="fairy-dust" class="hex-faint" points="0,0 20,0" />
  </defs>

  <!-- Hex vertex order: top-left, top-right, right, bottom-right, bottom-left, left -->


  <!-- ========================= -->
  <!--       Hex Clusters        -->
  <!-- ========================= -->
  <g id="top-left" transform="translate(200,200)">
    <!-- Center -->
    <polygon class="hex" points="-10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <!-- Top -->
    <polygon class="hex" points="-10,-51.96 10,-51.96 20,-34.64 10,-17.32 -10,-17.32 -20,-34.64" />
    <!-- Bottom -->
    <polygon class="hex" points="-10,17.32 10,17.32 20,34.64 10,51.96 -10,51.96 -20,34.64" />
    <!-- Top-right -->
    <polygon class="hex" points="20,-34.64 40,-34.64 50,-17.32 40,0 20,0 10,-17.32" />
    <!-- Bottom-right -->
    <polygon class="hex" points="20,0 40,0 50,17.32 40,34.64 20,34.64 10,17.32" />
    <!-- Top-left -->
    <polygon class="hex" points="-40,-34.64 -20,-34.64 -10,-17.32 -20,0 -40,0 -50,-17.32" />
    <!-- Bottom-left -->
    <polygon class="hex" points="-40,0 -20,0 -10,17.32 -20,34.64 -40,34.64 -50,17.32" />
  </g>
  <g id="bottom-left" transform="translate(400,1600)">
    <!-- Center -->
    <polygon class="hex" points="-10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <!-- Top -->
    <polygon class="hex" points="-10,-51.96 10,-51.96 20,-34.64 10,-17.32 -10,-17.32 -20,-34.64" />
    <!-- Bottom -->
    <polygon class="hex" points="-10,17.32 10,17.32 20,34.64 10,51.96 -10,51.96 -20,34.64" />
    <!-- Top-right -->
    <polygon class="hex" points="20,-34.64 40,-34.64 50,-17.32 40,0 20,0 10,-17.32" />
    <!-- Bottom-right -->
    <polygon class="hex" points="20,0 40,0 50,17.32 40,34.64 20,34.64 10,17.32" />
    <!-- Top-left -->
    <polygon class="hex" points="-40,-34.64 -20,-34.64 -10,-17.32 -20,0 -40,0 -50,-17.32" />
    <!-- Bottom-left -->
    <polygon class="hex" points="-40,0 -20,0 -10,17.32 -20,34.64 -40,34.64 -50,17.32" />
  </g>
  <g id="center" transform="translate(1000,800) rotate(120)">
    <!-- Center -->
    <polygon class="hex" points="-10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <!-- Top -->
    <polyline class="hex" points="10,-51.96 20,-34.64 10,-17.32" />
    <!-- Bottom-right -->
    <polyline class="hex" points="20,34.64 10,17.32 20,0 40,0 50,17.32" />
    <!-- Top-left -->
    <polyline class="hex" points="-20,-34.64 -10,-17.32 -20,0 -40,0" />
    <!-- Bottom-left -->
    <polyline class="hex" points="-20,0 -10,17.32 -20,34.64 -40,34.64" />
  </g>
  <g id="bottom-right" transform="translate(1700,1500) rotate(-30)">
    <!-- Center -->
    <polygon class="hex" points="-10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <!-- Top -->
    <polygon class="hex" points="-10,-51.96 10,-51.96 20,-34.64 10,-17.32 -10,-17.32 -20,-34.64" />
    <!-- Bottom -->
    <polyline class="hex" points="-10,17.32 10,17.32 20,34.64" />
    <!-- Top-right -->
    <polyline class="hex" points="20,-34.64 40,-34.64 50,-17.32" />
    <!-- Bottom-right -->
    <polygon class="hex" points="20,0 40,0 50,17.32 40,34.64 20,34.64 10,17.32" />
    <!-- Top-left -->
    <polyline class="hex" points="-40,-34.64 -20,-34.64 -10,-17.32" />
    <!-- Bottom-left -->
    <polygon class="hex" points="-40,0 -20,0 -10,17.32 -20,34.64 -40,34.64 -50,17.32" />
  </g>
  <g id="top-right" transform="translate(1500,450)">
    <!-- Center -->
    <polygon class="hex" points="-10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <!-- Top-right -->
    <polygon class="hex" points="20,-34.64 40,-34.64 50,-17.32 40,0 20,0 10,-17.32" />
    <!-- Bottom-right -->
    <polyline class="hex" points="20,34.64 10,17.32 20,0 40,0 50,17.32" />
    <!-- Bottom-left -->
    <polygon class="hex" points="-40,0 -20,0 -10,17.32 -20,34.64 -40,34.64 -50,17.32"/>
  </g>

  <!-- ========================= -->
  <!--      Small Clusters       -->
  <!-- ========================= -->
  <g id="left" transform="translate(300,900) rotate(90)">
    <polyline class="hex" points="10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <polyline class="hex" points="20,34.64 10,17.32 20,0 40,0 50,17.32" />
  </g>
  <g id="top" transform="translate(912,300)">
    <polyline class="hex" points="-20,0 0,0 10,-17.32 0,-34.64" />
  </g>
  <g id="bottom" transform="translate(1100,1800) rotate(40)">
    <polyline class="hex" points="0,0 10,17.32" />
    <polyline class="hex" points="10,17.32 0,34.64" />
  </g>
  <g id="right" transform="translate(1600,800) rotate(-60)">
    <polyline class="hex" points="20,-34.64 40,-34.64 50,-17.32" />
  </g>
  <g id="low-bottom-right" transform="translate(1200,1400)">
    <polyline class="hex" points="10,-17.32 20,0 10,17.32 -10,17.32 -20,0" />
    <polyline class="hex" points="20,34.64 10,17.32 20,0 40,0 50,17.32" />
    <polyline class="hex" points="-10,-17.32 -20,0 -40,0" />
  </g>

  <!-- ========================= -->
  <!--        Fairy Dust         -->
  <!-- ========================= -->
  <g transform="translate(600,500) rotate(15)">
    <use href="#fairy-dust" />
  </g>
  <g transform="translate(1300,300) rotate(75)">
    <use href="#fairy-dust" />
  </g>
  <g transform="translate(1700,1100) rotate(-40)">
    <use href="#fairy-dust" />
  </g>
  <g transform="translate(800,1500) rotate(120)">
    <use href="#fairy-dust" />
  </g>
  <g transform="translate(1100,1100) rotate(120)">
    <use href="#fairy-dust" />
  </g>

</svg>
